version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: e-carto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: e_carto_db
      POSTGRES_USER: e_carto_user
      POSTGRES_PASSWORD: e_carto_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - e-carto-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: e-carto-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecarto.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - e-carto-network

  redis:
    image: redis:7-alpine
    container_name: e-carto-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - e-carto-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e-carto-app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/e_carto_db
      SPRING_DATASOURCE_USERNAME: e_carto_user
      SPRING_DATASOURCE_PASSWORD: e_carto_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      APP_JWT_SECRET: mySecretKeyForJWTShouldBeVeryLongAndSecureForProduction
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - e-carto-network

volumes:
  postgres_data:
  redis_data:
  app_uploads:

networks:
  e-carto-network:
    driver: bridge