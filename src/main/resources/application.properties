# Configuration de l'application Spring Boot
spring.application.name=stage-eranove-academy

# Configuration du serveur
server.port=8080

# Configuration de la base de données PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/e_carto_db
spring.datasource.username=e_carto_user
spring.datasource.password=Doum@64
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Spring Cache Redis (Optionnel: sera désactivé si redis est absent, fallback sur simple)
spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Hibernate Envers
spring.jpa.properties.hibernate.integration.envers.enabled=true

# Configuration du pool de connexions
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Configuration JWT (CORRIGÉE - sans le préfixe "app.")
jwt.secret=votre-cle-secrete-tres-longue-pour-signer-les-jwt-au-moins-256-bits
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# BCrypt Configuration
spring.security.bcrypt.strength=8

# Configuration de l'upload de fichiers
app.upload.dir=${user.home}/e-carto-uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Configuration OpenAPI/Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.enabled=true

# Configuration des logs
logging.level.com.gs2e.stage_eranove_academy=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG

# Configuration Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=10

# Configuration pour le développement
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Configuration internationale
spring.mvc.locale=fr
spring.mvc.locale-resolver=fixed

# Configuration des timezones
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# Spring Security (ajouté)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMINISTRATEUR_SYSTEME
app.security.master-password=devPass123

